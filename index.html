<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fokus — Pomodoro Study Timer</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-S4JBFPRWRK"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-S4JBFPRWRK');
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #a8d8a8;
    --accent-dark: #2d5a2d;
    --glass: rgba(10,20,12,0.55);
    --glass-border: rgba(168,216,168,0.15);
    --text: #e8f0e8;
    --muted: rgba(232,240,232,0.5);
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }

  /* ── BACKGROUND ── */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background-size: cover; background-position: center;
    transition: opacity 0.6s;
  }
  #bgOverlay {
    position: fixed; inset: 0; z-index: 0;
    background: rgba(0,0,0,0.52);
    transition: background 0.6s;
  }

  /* ── SCENE PICKER ── */
  #scenePicker {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 10;
    display: flex; gap: 5px; flex-wrap: nowrap;
    background: rgba(0,0,0,0.45); border-radius: 30px;
    padding: 5px 8px; border: 0.5px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
  }
  .scene-btn {
    padding: 4px 13px; border-radius: 20px;
    font-size: 11px; font-weight: 400; letter-spacing: 0.03em;
    color: rgba(255,255,255,0.55); cursor: pointer;
    border: 1px solid transparent;
    background: transparent; transition: all 0.2s;
    white-space: nowrap; font-family: 'DM Sans', sans-serif;
  }
  .scene-btn:hover { color: rgba(255,255,255,0.9); }
  .scene-btn.active {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.25);
    color: #fff; font-weight: 500;
  }

  /* ── LAYOUT ── */
  #app {
    position: relative; z-index: 1;
    height: 100dvh; width: 100%;
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: 1fr;
    padding: 72px 24px 20px 24px;
    gap: 0;
  }

  /* ── LEFT: TIMER ── */
  #timerPanel {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  .mode-tabs {
    display: flex; gap: 4px;
    background: rgba(0,0,0,0.32); border-radius: 20px;
    padding: 4px; margin-bottom: 1.6rem;
    border: 0.5px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(6px);
  }
  .mtab {
    padding: 5px 17px; border-radius: 16px;
    font-size: 12px; color: rgba(255,255,255,0.5);
    cursor: pointer; transition: all 0.2s; border: none;
    background: transparent; font-family: 'DM Sans', sans-serif;
  }
  .mtab.active { background: rgba(255,255,255,0.15); color: #fff; font-weight: 500; }

  /* ── RING — bigger ── */
  .ring-container {
    position: relative;
    width: 260px; height: 260px;
    margin-bottom: 1.4rem;
  }
  .ring-container svg { transform: rotate(-90deg); }
  .ring-bg   { fill: none; stroke: rgba(255,255,255,0.08); }
  .ring-fill {
    fill: none; stroke: var(--accent);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
    filter: drop-shadow(0 0 8px var(--accent));
  }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  #bigTime {
    font-family: 'DM Serif Display', serif;
    font-size: 68px; line-height: 1;
    letter-spacing: -2px; color: #fff;
    text-shadow: 0 2px 24px rgba(0,0,0,0.6);
  }
  #modeLabel {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px;
  }
  #sessionBadge {
    font-size: 10px; color: var(--muted); margin-top: 3px;
    letter-spacing: 0.05em;
  }

  /* Controls */
  .ctrl-row {
    display: flex; gap: 12px; align-items: center; margin-bottom: 1rem;
  }
  #startBtn {
    padding: 11px 44px; border-radius: 30px;
    background: var(--accent); color: var(--accent-dark);
    font-size: 13px; font-weight: 500; letter-spacing: 0.08em;
    border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: transform 0.15s, opacity 0.2s, background 0.5s, color 0.5s;
    text-transform: uppercase;
  }
  #startBtn:hover { transform: scale(1.04); opacity: 0.92; }
  #startBtn:active { transform: scale(0.97); }

  .icon-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7); font-size: 15px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; backdrop-filter: blur(4px);
    font-family: 'DM Sans', sans-serif;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.2); }
  .icon-btn.danger:hover { background: rgba(220,60,60,0.3); color: #ff9a9a; }

  /* Custom durations */
  .custom-row {
    display: flex; gap: 14px; align-items: center;
    margin-bottom: 0.8rem;
    background: rgba(0,0,0,0.25); border-radius: 12px;
    padding: 8px 16px; border: 0.5px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(4px);
  }
  .dur-group { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .dur-group label { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
  .dur-group input[type=number] {
    width: 44px; text-align: center;
    background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 6px; color: #fff; font-size: 13px; padding: 4px;
    font-family: 'DM Sans', sans-serif;
  }
  .dur-group input[type=number]:focus { outline: none; border-color: var(--accent); }

  /* Stats */
  .stats-row { display: flex; gap: 8px; }
  .stat-box {
    text-align: center; padding: 8px 14px;
    background: rgba(0,0,0,0.25); border-radius: 10px;
    border: 0.5px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(4px);
  }
  .stat-n { font-size: 20px; font-family: 'DM Serif Display', serif; }
  .stat-l { font-size: 9px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }

  /* ── RIGHT PANEL ── */
  #rightPanel {
    display: flex; flex-direction: column;
    gap: 10px; overflow: hidden; max-height: 100%;
    padding-left: 16px;
  }

  .panel-card {
    background: var(--glass);
    border: 0.5px solid var(--glass-border);
    border-radius: 16px; padding: 13px 15px;
    backdrop-filter: blur(18px);
  }

  .panel-label {
    font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 9px;
  }

  /* ── AUDIO CONTROLS ── */
  .audio-section { display: flex; flex-direction: column; gap: 10px; }

  .audio-row {
    display: flex; align-items: center; gap: 9px;
  }
  .play-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--accent-dark); flex-shrink: 0;
    transition: background 0.5s, transform 0.15s;
  }
  .play-btn:hover { transform: scale(1.08); }
  .audio-info { flex: 1; min-width: 0; }
  .audio-title { font-size: 12px; font-weight: 500; }
  .audio-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }
  input[type=range].vol {
    width: 68px; accent-color: var(--accent); flex-shrink: 0;
  }

  .audio-divider {
    height: 0.5px; background: rgba(255,255,255,0.08); margin: 0 -2px;
  }

  /* ── TASKS ── */
  #tasksCard { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .task-input-row { display: flex; gap: 6px; margin-bottom: 9px; }
  .task-input-row input {
    flex: 1; background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: #fff; font-size: 13px;
    padding: 6px 10px; font-family: 'DM Sans', sans-serif; outline: none;
  }
  .task-input-row input::placeholder { color: rgba(255,255,255,0.28); }
  .task-input-row input:focus { border-color: var(--accent); }
  .task-add-btn {
    padding: 6px 13px; border-radius: 8px;
    background: var(--accent); color: var(--accent-dark);
    font-size: 12px; font-weight: 500; cursor: pointer; border: none;
    font-family: 'DM Sans', sans-serif; transition: background 0.5s;
    white-space: nowrap;
  }
  .task-scroll { flex: 1; overflow-y: auto; min-height: 0; }
  .task-scroll::-webkit-scrollbar { width: 3px; }
  .task-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
  ul#taskList { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .task-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 9px; border-radius: 9px;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid transparent;
    transition: background 0.15s;
  }
  .task-item:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.08); }
  .task-item input[type=checkbox] { accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
  .task-text { flex: 1; font-size: 13px; }
  .task-text.done { text-decoration: line-through; opacity: 0.35; }
  .task-del {
    background: none; border: none; color: rgba(255,255,255,0.25);
    cursor: pointer; font-size: 12px; opacity: 0; transition: opacity 0.15s; padding: 2px;
  }
  .task-item:hover .task-del { opacity: 1; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(15,15,15,0.92); color: #fff;
    padding: 9px 22px; border-radius: 20px; font-size: 13px;
    backdrop-filter: blur(8px); border: 0.5px solid rgba(255,255,255,0.1);
    z-index: 20; pointer-events: none;
    opacity: 0; transition: opacity 0.35s; white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── PARTICLES ── */
  #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .particle {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.35);
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    from { transform: translateY(0) scale(1); opacity: 0.3; }
    to   { transform: translateY(-100vh) scale(0.2); opacity: 0; }
  }

  /* ── RING PULSE ── */
  @keyframes ringPulse {
    0%,100% { filter: drop-shadow(0 0 6px var(--accent)); }
    50%      { filter: drop-shadow(0 0 22px var(--accent)); }
  }
  .ring-fill.pulse { animation: ringPulse 0.7s ease-in-out 4; }

  /* ── NEXT-UP BANNER ── */
  #nextBanner {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.05em; margin-top: 0.4rem;
    min-height: 16px; text-align: center;
    transition: opacity 0.3s;
  }

  @media (max-width: 720px) {
    #app {
      grid-template-columns: 1fr;
      padding: 68px 14px 14px;
      height: auto; overflow-y: auto;
    }
    #rightPanel { padding-left: 0; }
    .ring-container { width: 220px; height: 220px; }
    #bigTime { font-size: 56px; }
  }
</style>
</head>
<body>

<div id="bg"></div>
<div id="bgOverlay"></div>
<div id="particles"></div>

<!-- Scene Picker -->
<div id="scenePicker">
  <button class="scene-btn active" data-scene="0">🌲 Rainy Forest</button>
  <button class="scene-btn" data-scene="1">🌃 Night City</button>
  <button class="scene-btn" data-scene="2">📚 Cozy Library</button>
  <button class="scene-btn" data-scene="3">🏔 Mountain Lake</button>
  <button class="scene-btn" data-scene="4">☕ Café Window</button>
</div>

<div id="app">

  <!-- LEFT: TIMER -->
  <div id="timerPanel">
    <div class="mode-tabs">
      <button class="mtab active" data-mode="focus">Focus</button>
      <button class="mtab" data-mode="short">Short Break</button>
      <button class="mtab" data-mode="long">Long Break</button>
    </div>

    <div class="ring-container">
      <!-- r=118 → circ = 2π×118 ≈ 741.4 -->
      <svg width="260" height="260" viewBox="0 0 260 260">
        <circle class="ring-bg" cx="130" cy="130" r="118" stroke-width="7"/>
        <circle class="ring-fill" id="ringFill" cx="130" cy="130" r="118"
          stroke-width="7" stroke-dasharray="741.4" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div id="bigTime">25:00</div>
        <div id="modeLabel">Focus</div>
        <div id="sessionBadge">Session 1</div>
      </div>
    </div>

    <div class="ctrl-row">
      <button class="icon-btn" id="resetBtn" title="Reset timer">↺</button>
      <button id="startBtn">Start</button>
      <button class="icon-btn" id="skipBtn" title="Skip session">⟶</button>
      <button class="icon-btn danger" id="fullResetBtn" title="Reset everything">⊘</button>
    </div>

    <div id="nextBanner"></div>

    <div class="custom-row" style="margin-top:0.7rem;">
      <div class="dur-group">
        <label>Focus</label>
        <input type="number" id="durFocus" value="25" min="1" max="99">
      </div>
      <div class="dur-group">
        <label>Short brk</label>
        <input type="number" id="durShort" value="5" min="1" max="60">
      </div>
      <div class="dur-group">
        <label>Long brk</label>
        <input type="number" id="durLong" value="15" min="1" max="99">
      </div>
    </div>

    <div class="stats-row" style="margin-top:0.7rem;">
      <div class="stat-box"><div class="stat-n" id="sFocus">0</div><div class="stat-l">Sessions</div></div>
      <div class="stat-box"><div class="stat-n" id="sBreaks">0</div><div class="stat-l">Breaks</div></div>
      <div class="stat-box"><div class="stat-n" id="sMins">0</div><div class="stat-l">Minutes</div></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="rightPanel">

    <!-- Audio card -->
    <div class="panel-card">
      <div class="panel-label">Sound</div>
      <div class="audio-section">

        <!-- Lofi music -->
        <div class="audio-row">
          <button class="play-btn" id="playLofiBtn">▶</button>
          <div class="audio-info">
            <div class="audio-title">Lofi Radio</div>
            <div class="audio-sub">Chill beats · study &amp; relax</div>
          </div>
          <input type="range" class="vol" id="lofiVol" min="0" max="1" step="0.05" value="0.5">
        </div>

        <div class="audio-divider"></div>

        <!-- Rain -->
        <div class="audio-row">
          <button class="play-btn" id="playRainBtn">▶</button>
          <div class="audio-info">
            <div class="audio-title">Rain &amp; Thunder</div>
            <div class="audio-sub">Ambient nature sounds</div>
          </div>
          <input type="range" class="vol" id="rainVol" min="0" max="1" step="0.05" value="0.4">
        </div>

      </div>
    </div>

    <!-- Tasks -->
    <div class="panel-card" id="tasksCard">
      <div class="panel-label">Tasks</div>
      <div class="task-input-row">
        <input type="text" id="taskInput" placeholder="What are you working on?" maxlength="80">
        <button class="task-add-btn" id="taskAddBtn">+ Add</button>
      </div>
      <div class="task-scroll">
        <ul id="taskList"></ul>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// SCENES
// ─────────────────────────────────────────────
const SCENES = [
  {
    name: "Rainy Forest",
    img: "https://images.unsplash.com/photo-1448375240586-882707db888b?w=1600&q=80",
    overlay: "rgba(4,16,6,0.54)",
    accent: "#7ecfa0", dark: "#1a3d28",
    glass: "rgba(6,20,10,0.6)",
    particles: true,
  },
  {
    name: "Night City",
    img: "https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=1600&q=80",
    overlay: "rgba(4,6,20,0.58)",
    accent: "#82b4f0", dark: "#0d1e3a",
    glass: "rgba(6,10,26,0.62)",
    particles: false,
  },
  {
    name: "Cozy Library",
    img: "https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=1600&q=80",
    overlay: "rgba(16,8,2,0.56)",
    accent: "#f0c882", dark: "#3a2205",
    glass: "rgba(22,12,4,0.62)",
    particles: false,
  },
  {
    name: "Mountain Lake",
    // fixed — direct photo ID
    img: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80",
    overlay: "rgba(3,12,20,0.52)",
    accent: "#82d0e8", dark: "#0a2030",
    glass: "rgba(4,14,24,0.60)",
    particles: true,
  },
  {
    name: "Café Window",
    img: "https://images.unsplash.com/photo-1442512595331-e89e73853f31?w=1600&q=80",
    overlay: "rgba(10,6,2,0.56)",
    accent: "#e8b87a", dark: "#2e1a06",
    glass: "rgba(16,10,4,0.62)",
    particles: false,
  },
];

let currentScene = 0;

function applyScene(i) {
  currentScene = i;
  const s = SCENES[i];
  const bgEl = document.getElementById('bg');
  const ovEl = document.getElementById('bgOverlay');
  bgEl.style.backgroundImage = `url('${s.img}')`;
  bgEl.style.backgroundSize = 'cover';
  bgEl.style.backgroundPosition = 'center';
  ovEl.style.background = s.overlay;
  document.documentElement.style.setProperty('--accent', s.accent);
  document.documentElement.style.setProperty('--accent-dark', s.dark);
  document.documentElement.style.setProperty('--glass', s.glass);
  document.documentElement.style.setProperty('--glass-border', s.accent + '28');
  document.querySelectorAll('.scene-btn').forEach((b,j) => b.classList.toggle('active', j===i));
  buildParticles(s.particles);
}

document.querySelectorAll('.scene-btn').forEach(b =>
  b.addEventListener('click', () => applyScene(+b.dataset.scene))
);

// ─────────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────────
function buildParticles(on) {
  const p = document.getElementById('particles');
  p.innerHTML = '';
  if (!on) return;
  for (let i = 0; i < 22; i++) {
    const d = document.createElement('div');
    d.className = 'particle';
    const size = 1.5 + Math.random() * 2.5;
    d.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:${Math.random()*50}%;animation-duration:${9+Math.random()*14}s;animation-delay:-${Math.random()*14}s;opacity:${0.1+Math.random()*0.25};`;
    p.appendChild(d);
  }
}

// ─────────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────────
const CIRC = 741.4; // 2π × 118
let mode = 'focus';
let focusSessionNum = 1;  // which focus session we're on (for long break after 4)
let running = false;
let timerId = null;
let remaining = 0;

// Stats
let sessionCount = 0, breakCount = 0, focusMins = 0;

function getDurations() {
  return {
    focus: (parseInt(document.getElementById('durFocus').value)||25)*60,
    short: (parseInt(document.getElementById('durShort').value)||5)*60,
    long:  (parseInt(document.getElementById('durLong').value)||15)*60,
  };
}

// Switch to a mode — always paused, loads fresh time
function switchMode(m, autoDisplay=true) {
  mode = m;
  clearInterval(timerId); running = false;
  remaining = getDurations()[m];
  document.querySelectorAll('.mtab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  const labels = { focus:'Focus', short:'Short Break', long:'Long Break' };
  document.getElementById('modeLabel').textContent = labels[m];
  document.getElementById('startBtn').textContent = 'Start';
  if (autoDisplay) updateDisplay();
  updateNextBanner();
}

// Manual tab click
document.querySelectorAll('.mtab').forEach(t =>
  t.addEventListener('click', () => switchMode(t.dataset.mode))
);

function updateDisplay() {
  const mm = Math.floor(remaining/60), ss = remaining%60;
  const str = String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
  document.getElementById('bigTime').textContent = str;
  document.title = str + ' · Fokus';
  const total = getDurations()[mode];
  const frac = total > 0 ? (total - remaining) / total : 1;
  document.getElementById('ringFill').setAttribute('stroke-dashoffset', CIRC * (1 - frac));
  document.getElementById('sessionBadge').textContent = `Session ${focusSessionNum}`;
}

function updateNextBanner() {
  const el = document.getElementById('nextBanner');
  if (mode === 'focus') {
    const next = (focusSessionNum % 4 === 0) ? 'Long Break' : 'Short Break';
    el.textContent = `Next up: ${next} after this session`;
  } else {
    el.textContent = `Next up: Focus session ${focusSessionNum}`;
  }
}

function start() {
  const d = getDurations();
  if (remaining <= 0) remaining = d[mode];
  running = true;
  document.getElementById('startBtn').textContent = 'Pause';
  timerId = setInterval(tick, 1000);
}

function pause() {
  running = false;
  clearInterval(timerId);
  document.getElementById('startBtn').textContent = 'Resume';
}

function tick() {
  if (remaining > 0) {
    remaining--;
    updateDisplay();
  } else {
    clearInterval(timerId);
    running = false;
    onSessionDone();
  }
}

function onSessionDone() {
  playNotificationTone();
  pulseRing();

  if (mode === 'focus') {
    sessionCount++;
    focusMins += Math.round(getDurations().focus / 60);
    document.getElementById('sFocus').textContent = sessionCount;
    document.getElementById('sMins').textContent = focusMins;

    // After every 4 focus sessions → long break, else short break
    const nextMode = (focusSessionNum % 4 === 0) ? 'long' : 'short';
    toast(nextMode === 'long'
      ? `4 sessions done! Take a long break 🌿`
      : `Focus done! Short break time ☕`
    );
    // Auto-switch to break (paused — user must press Start)
    switchMode(nextMode);

  } else {
    breakCount++;
    document.getElementById('sBreaks').textContent = breakCount;

    if (mode === 'short') focusSessionNum++;
    else if (mode === 'long') focusSessionNum++;

    toast(`Break over — ready for session ${focusSessionNum}? ✨`);
    // Auto-switch to focus (paused)
    switchMode('focus');
  }
}

// ── Notification tone (Web Audio API — no assets needed) ──
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playNotificationTone() {
  try {
    const ctx = getAudioCtx();
    // Three gentle ascending bell tones
    const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.22);
      gain.gain.linearRampToValueAtTime(0.22, ctx.currentTime + i * 0.22 + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.22 + 0.9);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.22);
      osc.stop(ctx.currentTime + i * 0.22 + 1);
    });
  } catch(e) {}
}

function pulseRing() {
  const r = document.getElementById('ringFill');
  r.classList.remove('pulse');
  void r.offsetWidth;
  r.classList.add('pulse');
  setTimeout(() => r.classList.remove('pulse'), 3000);
}

// Controls
document.getElementById('startBtn').addEventListener('click', () => running ? pause() : start());

document.getElementById('resetBtn').addEventListener('click', () => {
  pause();
  remaining = getDurations()[mode];
  document.getElementById('startBtn').textContent = 'Start';
  updateDisplay();
});

document.getElementById('skipBtn').addEventListener('click', () => {
  clearInterval(timerId); running = false;
  remaining = 0;
  onSessionDone();
});

// Full reset — stats + session counter
document.getElementById('fullResetBtn').addEventListener('click', () => {
  if (!confirm('Reset everything? This clears all session stats and the timer.')) return;
  clearInterval(timerId); running = false;
  focusSessionNum = 1;
  sessionCount = 0; breakCount = 0; focusMins = 0;
  document.getElementById('sFocus').textContent = '0';
  document.getElementById('sBreaks').textContent = '0';
  document.getElementById('sMins').textContent = '0';
  switchMode('focus');
  toast('Everything reset 🔄');
});

['durFocus','durShort','durLong'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    if (!running) { remaining = getDurations()[mode]; updateDisplay(); }
  });
});

// ─────────────────────────────────────────────
// LOFI MUSIC STREAM
// ─────────────────────────────────────────────
let lofiAudio = null;
let lofiPlaying = false;

function toggleLofi() {
  if (!lofiAudio) {
    lofiAudio = new Audio();
    lofiAudio.crossOrigin = 'anonymous';
    // Free lofi radio stream
    lofiAudio.src = 'https://streams.ilovemusic.de/iloveradio17.mp3';
    lofiAudio.volume = parseFloat(document.getElementById('lofiVol').value);
  }
  if (lofiPlaying) {
    lofiAudio.pause();
    lofiPlaying = false;
    document.getElementById('playLofiBtn').textContent = '▶';
  } else {
    lofiAudio.play().then(() => {
      lofiPlaying = true;
      document.getElementById('playLofiBtn').textContent = '⏸';
    }).catch(() => toast('Cannot load stream — check your connection 🔌'));
  }
}

document.getElementById('playLofiBtn').addEventListener('click', toggleLofi);
document.getElementById('lofiVol').addEventListener('input', e => {
  if (lofiAudio) lofiAudio.volume = e.target.value;
});

// ─────────────────────────────────────────────
// RAIN & THUNDER — Web Audio synthesis
// (no external assets, works offline)
// ─────────────────────────────────────────────
let rainCtx = null, rainGain = null, rainNodes = [], thunderTimer = null;
let rainOn = false;

function startRain() {
  if (!rainCtx) {
    rainCtx = new (window.AudioContext || window.webkitAudioContext)();
    rainGain = rainCtx.createGain();
    rainGain.gain.value = parseFloat(document.getElementById('rainVol').value);
    rainGain.connect(rainCtx.destination);
    buildRainNodes();
    scheduleThunder();
  } else {
    rainCtx.resume();
    scheduleThunder();
  }
}

function stopRain() {
  if (rainCtx) rainCtx.suspend();
  clearTimeout(thunderTimer);
}

function buildRainNodes() {
  // Multiple filtered noise bands to simulate rain texture
  const bands = [
    { f: 800,  q: 0.7, g: 0.18 },
    { f: 2400, q: 0.5, g: 0.14 },
    { f: 5000, q: 0.4, g: 0.09 },
    { f: 300,  q: 1.2, g: 0.06 },
    { f: 12000,q: 0.3, g: 0.05 },
  ];
  bands.forEach(b => {
    const bufSec = 4;
    const buf = rainCtx.createBuffer(1, rainCtx.sampleRate * bufSec, rainCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;

    const src = rainCtx.createBufferSource();
    src.buffer = buf; src.loop = true;

    const filt = rainCtx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = b.f;
    filt.Q.value = b.q;

    const g = rainCtx.createGain();
    g.gain.value = b.g;

    src.connect(filt); filt.connect(g); g.connect(rainGain);
    src.start();
    rainNodes.push(src);
  });
}

function scheduleThunder() {
  const delay = 12000 + Math.random() * 28000; // 12–40s between thunders
  thunderTimer = setTimeout(() => {
    if (rainOn) { playThunder(); scheduleThunder(); }
  }, delay);
}

function playThunder() {
  if (!rainCtx || rainCtx.state === 'suspended') return;
  try {
    // Thunder = low-freq noise burst with sharp attack and long rumble decay
    const dur = 3.5 + Math.random() * 2;
    const bufLen = Math.floor(rainCtx.sampleRate * dur);
    const buf = rainCtx.createBuffer(1, bufLen, rainCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;

    const src = rainCtx.createBufferSource();
    src.buffer = buf;

    const filt = rainCtx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 180 + Math.random() * 120;

    const tg = rainCtx.createGain();
    const now = rainCtx.currentTime;
    tg.gain.setValueAtTime(0, now);
    tg.gain.linearRampToValueAtTime(0.55 + Math.random()*0.3, now + 0.08);
    tg.gain.exponentialRampToValueAtTime(0.001, now + dur);

    src.connect(filt); filt.connect(tg); tg.connect(rainGain);
    src.start(now); src.stop(now + dur + 0.1);
  } catch(e) {}
}

function toggleRain() {
  if (rainOn) {
    stopRain();
    rainOn = false;
    document.getElementById('playRainBtn').textContent = '▶';
  } else {
    startRain();
    rainOn = true;
    document.getElementById('playRainBtn').textContent = '⏸';
  }
}

document.getElementById('playRainBtn').addEventListener('click', toggleRain);
document.getElementById('rainVol').addEventListener('input', e => {
  if (rainGain) rainGain.gain.setTargetAtTime(parseFloat(e.target.value), rainCtx.currentTime, 0.1);
});

// ─────────────────────────────────────────────
// TASKS
// ─────────────────────────────────────────────
let tasks = [];
try { tasks = JSON.parse(localStorage.getItem('fokus_tasks') || '[]'); } catch(e) { tasks = []; }

function saveTasks() {
  try { localStorage.setItem('fokus_tasks', JSON.stringify(tasks)); } catch(e) {}
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderTasks() {
  const ul = document.getElementById('taskList');
  ul.innerHTML = '';
  tasks.forEach(t => {
    const li = document.createElement('li');
    li.className = 'task-item';
    li.innerHTML = `
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})">
      <span class="task-text ${t.done?'done':''}">${escHtml(t.text)}</span>
      <button class="task-del" onclick="deleteTask(${t.id})">✕</button>
    `;
    ul.appendChild(li);
  });
}

function addTask() {
  const inp = document.getElementById('taskInput');
  const v = inp.value.trim();
  if (!v) return;
  tasks.unshift({ id: Date.now(), text: v, done: false });
  inp.value = ''; saveTasks(); renderTasks();
}

function toggleTask(id) {
  tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
  saveTasks(); renderTasks();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id!==id);
  saveTasks(); renderTasks();
}

document.getElementById('taskAddBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3400);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
applyScene(0);
switchMode('focus');
renderTasks();
</script>
